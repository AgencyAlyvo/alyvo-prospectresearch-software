name: build-compile-deploy-staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  XCODE_VERSION: '26.4.1'
  NODE_VERSION: '24.15.0'

  # Certificat Apple au format p12 encodé en base64
  MACOS_APPLE_CERTIFICATE_DEVELOPERIDAPPLICATION_P12_BASE64: ${{ secrets.MACOS_APPLE_CERTIFICATE_DEVELOPERIDAPPLICATION_P12_BASE64 }}
  # Mot de passe du certificat p12
  MACOS_APPLE_CERTIFICATE_DEVELOPERIDAPPLICATION_P12_PASSWORD: ${{ secrets.MACOS_APPLE_CERTIFICATE_DEVELOPERIDAPPLICATION_P12_PASSWORD }}
  # Un nouveau trousseau sera créé sur le coureur, de sorte que le mot de passe du nouveau trousseau peut être n'importe quelle nouvelle chaîne aléatoire
  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
  # L'id de l'équipe Apple
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
  # Email du compte apple developer
  APPLE_ID: ${{ secrets.APPLE_ID }}
  # Mot de passe de l'application spécifique Apple
  APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APPLICATION_SPECIFIC_PASSWORD }}

  # Variables d'environnement pour le déploiement sur OVH S3, utilisées pour l'étape de déploiement avec AWS CLI (sync)
  # Même si c'est écrit "AWS_", ce sont en réalité les identifiants d'accès pour le bucket OVH S3, car OVH S3 est compatible avec l'API AWS S3
  AWS_ACCESS_KEY_ID: ${{ secrets.ALYVO_S3_BUCKET_OVH_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.ALYVO_S3_BUCKET_OVH_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ secrets.ALYVO_S3_BUCKET_OVH_REGION }}
  OVH_S3_ENDPOINT: ${{ secrets.ALYVO_S3_BUCKET_OVH_ENDPOINT }}
  OVH_S3_BUCKET: ${{ secrets.ALYVO_S3_BUCKET_OVH_NAME }}

jobs:
  build_app:
    strategy:
      fail-fast: true
      matrix:
        platform: [macos-26, ubuntu-22.04, ubuntu-22.04-arm, windows-2025-vs2026, windows-11-arm]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js version LTS and setup cache - All platforms
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies for project - All platforms
        run: npm install

      - name: Lint TypeScript - All platforms
        run: npm run lint:ts

      - name: Install dependencies for Tauri - Linux (x64/arm64)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
        run: >-
          sudo apt-get update &&
          sudo apt-get install -y 
          libwebkit2gtk-4.1-dev
          build-essential
          curl
          wget
          file
          libxdo-dev
          libssl-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          xdg-utils

      - name: Setup new version xCode - macOS (arm64)
        if: matrix.platform == 'macos-26'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Setup Rust - All platforms
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache - All platforms
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Modify identifier and endpoint updater in tauri.conf.json for staging - All platforms
        run: |
          npx json -I -f src-tauri/tauri.conf.json -e "this.identifier = 'fr.alyvo.prospectresearch.staging'"
          npx json -I -f src-tauri/tauri.conf.json -e "this.plugins.updater.endpoints = ['https://staging.api.prospectresearch.alyvo.fr/prospectresearch/staging/software/updater/{{target}}/{{arch}}/{{current_version}}']"
          npx json -I -f src-tauri/tauri.conf.json -e "this.productName = 'Alyvo ProspectResearch Staging'"
          cat src-tauri/tauri.conf.json

      - name: Rust Install target compilation - Windows (x64/arm64)
        if: matrix.platform == 'windows-2025' || matrix.platform == 'windows-11-arm'
        run: npm run desktop:install:target:windows

      - name: Rust Install target compilation - macOS (arm64)
        if: matrix.platform == 'macos-26'
        run: npm run desktop:install:target:macos

      - name: Rust Install target compilation - Linux (x64/arm64)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
        run: npm run desktop:install:target:linux

      - name: Change the default toolchain used - Windows(x64)
        if: matrix.platform == 'windows-2025'
        run: rustup default stable-x86_64-pc-windows-msvc

      - name: Change the default toolchain used - Windows(arm64)
        if: matrix.platform == 'windows-11-arm'
        run: rustup default stable-aarch64-pc-windows-msvc

      - name: Change the default toolchain used - macOS(arm64)
        if: matrix.platform == 'macos-26'
        run: rustup default stable-aarch64-apple-darwin

      - name: Change the default toolchain used - Linux(x64)
        if: matrix.platform == 'ubuntu-22.04'
        run: rustup default stable-x86_64-unknown-linux-gnu

      - name: Change the default toolchain used - Linux(arm64)
        if: matrix.platform == 'ubuntu-22.04-arm'
        run: rustup default stable-aarch64-unknown-linux-gnu

      - name: Install the Apple Certificate (Developer ID Application) - Not Mac AppStore - macOS
        if: matrix.platform == 'macos-26'
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate
          echo -n "${{ env.MACOS_APPLE_CERTIFICATE_DEVELOPERIDAPPLICATION_P12_BASE64 }}" | base64 --decode -o $CERTIFICATE_PATH

          # create temporary keychain
          security create-keychain -p "${{ env.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "${{ env.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH -P "${{ env.MACOS_APPLE_CERTIFICATE_DEVELOPERIDAPPLICATION_P12_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "${{ env.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build app and Sign app - macOS (arm64)
        if: matrix.platform == 'macos-26'
        env:
          # Les variable d'environnement ci-dessous sont attendu par Tauri.
          # Référence de la branche
          GITHUB_REF: ${{ github.ref }}
          # Identifiant de l'équipe Apple
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          # Email du compte apple developer
          APPLE_ID: ${{ env.APPLE_ID }}
          # Mot de passe de l'application spécifique Apple
          APPLE_PASSWORD: ${{ env.APPLE_APPLICATION_SPECIFIC_PASSWORD }}
          # Certificat Apple au format p12 encodé en base64
          APPLE_CERTIFICATE: ${{ env.MACOS_APPLE_CERTIFICATE_DEVELOPERIDAPPLICATION_P12_BASE64 }}
          # Mot de passe du certificat p12
          APPLE_CERTIFICATE_PASSWORD: ${{ env.MACOS_APPLE_CERTIFICATE_DEVELOPERIDAPPLICATION_P12_PASSWORD }}
        run: |
          npm run desktop:build:macos:arm64

      - name: Build app - Windows (x64)
        if: matrix.platform == 'windows-2025'
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          npm run desktop:build:windows:x64

      - name: Build app - Windows (arm64)
        if: matrix.platform == 'windows-11-arm'
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          npm run desktop:build:windows:arm64

      - name: Build app - Linux (x64)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          npm run desktop:build:linux:x86_64

      - name: Build app - Linux (arm64)
        if: matrix.platform == 'ubuntu-22.04-arm'
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          npm run desktop:build:linux:arm64

      - name: Rename file - Windows (x64)
        if: matrix.platform == 'windows-2025'
        run: |
          mv src-tauri\target\x86_64-pc-windows-msvc\release\bundle\msi\*.msi src-tauri\target\x86_64-pc-windows-msvc\release\bundle\msi\AlyvoProspectResearchSetup_x64.msi
          mv src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis\*.exe src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis\AlyvoProspectResearchSetup_x64.exe
          mv src-tauri\target\x86_64-pc-windows-msvc\release\bundle\msi\*.msi.sig src-tauri\target\x86_64-pc-windows-msvc\release\bundle\msi\AlyvoProspectResearchSetup_x64.msi.sig
          mv src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis\*.exe.sig src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis\AlyvoProspectResearchSetup_x64.exe.sig

      - name: Rename file - Windows (arm64)
        if: matrix.platform == 'windows-11-arm'
        run: |
          mv src-tauri\target\aarch64-pc-windows-msvc\release\bundle\msi\*.msi src-tauri\target\aarch64-pc-windows-msvc\release\bundle\msi\AlyvoProspectResearchSetup_arm64.msi
          mv src-tauri\target\aarch64-pc-windows-msvc\release\bundle\nsis\*.exe src-tauri\target\aarch64-pc-windows-msvc\release\bundle\nsis\AlyvoProspectResearchSetup_arm64.exe
          mv src-tauri\target\aarch64-pc-windows-msvc\release\bundle\msi\*.msi.sig src-tauri\target\aarch64-pc-windows-msvc\release\bundle\msi\AlyvoProspectResearchSetup_arm64.msi.sig
          mv src-tauri\target\aarch64-pc-windows-msvc\release\bundle\nsis\*.exe.sig src-tauri\target\aarch64-pc-windows-msvc\release\bundle\nsis\AlyvoProspectResearchSetup_arm64.exe.sig

      - name: Rename file - Linux (x64)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mv src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/AlyvoProspectResearchSetup_x86_64.AppImage.sig
          mv src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/AlyvoProspectResearchSetup_x86_64.AppImage
          mv src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/AlyvoProspectResearchSetup_x86_64.deb
          mv src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/AlyvoProspectResearchSetup_x86_64.rpm

      - name: Rename file - Linux (arm64)
        if: matrix.platform == 'ubuntu-22.04-arm'
        run: |
          mv src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/AlyvoProspectResearchSetup_arm64.AppImage.sig
          mv src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/AlyvoProspectResearchSetup_arm64.AppImage
          mv src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/AlyvoProspectResearchSetup_arm64.deb
          mv src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/rpm/*.rpm src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/rpm/AlyvoProspectResearchSetup_arm64.rpm

      - name: Rename file - macOS (arm64)
        if: matrix.platform == 'macos-26'
        run: |
          mv src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz src-tauri/target/aarch64-apple-darwin/release/bundle/macos/AlyvoProspectResearchSetup_arm64.app.tar.gz
          mv src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig src-tauri/target/aarch64-apple-darwin/release/bundle/macos/AlyvoProspectResearchSetup_arm64.app.tar.gz.sig
          mv src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app src-tauri/target/aarch64-apple-darwin/release/bundle/macos/AlyvoProspectResearchSetup_arm64.app
          mv src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/AlyvoProspectResearchSetup_arm64.dmg

      - name: Verify the signature - macOS (arm64)
        if: matrix.platform == 'macos-26'
        run: |
          # Vérifier la signature de l'application .app
          codesign --verify --deep --strict --verbose=4 src-tauri/target/aarch64-apple-darwin/release/bundle/macos/AlyvoProspectResearchSetup_arm64.app

          # Vérifier la signature du fichier .dmg
          codesign --verify --strict --verbose=4 src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/AlyvoProspectResearchSetup_arm64.dmg

      - name: Store credentials for notarization - macOS (arm64)
        if: matrix.platform == 'macos-26'
        run: |
          xcrun notarytool store-credentials login \
          --apple-id "${{ env.APPLE_ID }}" \
          --team-id "${{ env.APPLE_TEAM_ID }}" \
          --password "${{ env.APPLE_APPLICATION_SPECIFIC_PASSWORD }}"

      - name: Create zip for notarization .dmg and .app - macOS (arm64)
        if: matrix.platform == 'macos-26'
        run: |
          mkdir -p notarization
          zip -r notarization/AlyvoProspectResearchSetup_arm64.app.zip src-tauri/target/aarch64-apple-darwin/release/bundle/macos/AlyvoProspectResearchSetup_arm64.app
          zip -r notarization/AlyvoProspectResearchSetup_arm64.dmg.zip src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/AlyvoProspectResearchSetup_arm64.dmg

      - name: Submit .dmg and .app for notarization + print log if invalid or valid - macOS (arm64)
        if: matrix.platform == 'macos-26'
        run: |
          xcrun notarytool submit notarization/AlyvoProspectResearchSetup_arm64.app.zip \
          --keychain-profile login \
          --wait \
          --verbose || (xcrun notarytool log --keychain-profile login --id $(xcrun notarytool history --keychain-profile login --format json | jq -r '.[0].id') && exit 1)

          xcrun notarytool submit notarization/AlyvoProspectResearchSetup_arm64.dmg.zip \
          --keychain-profile login \
          --wait \
          --verbose || (xcrun notarytool log --keychain-profile login --id $(xcrun notarytool history --keychain-profile login --format json | jq -r '.[0].id') && exit 1)

      - name: Staple the notarization ticket - macOS (arm64)
        if: matrix.platform == 'macos-26'
        run: |
          xcrun stapler staple src-tauri/target/aarch64-apple-darwin/release/bundle/macos/AlyvoProspectResearchSetup_arm64.app
          xcrun stapler staple src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/AlyvoProspectResearchSetup_arm64.dmg

      - name: Verify the signature and notarization - macOS (arm64)
        if: matrix.platform == 'macos-26'
        run: |
          # Vérifier la signature de l'application .app
          codesign --verify --deep --strict --verbose=4 src-tauri/target/aarch64-apple-darwin/release/bundle/macos/AlyvoProspectResearchSetup_arm64.app

          # Vérifier la signature du fichier .dmg
          codesign --verify --strict --verbose=4 src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/AlyvoProspectResearchSetup_arm64.dmg

      - name: Upload Artifact - Linux (x64)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v7
        with:
          name: linux-x86_64
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig
          retention-days: 1
          if-no-files-found: error

      - name: Upload Artifact - Linux (arm64)
        if: matrix.platform == 'ubuntu-22.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: linux-arm64
          path: |
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/rpm/*.rpm
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig
          retention-days: 1
          if-no-files-found: error

      - name: Upload Artifact - macOS (arm64)
        if: matrix.platform == 'macos-26'
        uses: actions/upload-artifact@v7
        with:
          name: macos
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          retention-days: 1
          if-no-files-found: error

      - name: Upload Artifact - Windows (x64)
        if: matrix.platform == 'windows-2025'
        uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe.sig
          retention-days: 1
          if-no-files-found: error

      - name: Upload Artifact - Windows (arm64)
        if: matrix.platform == 'windows-11-arm'
        uses: actions/upload-artifact@v7
        with:
          name: windows-arm64
          path: |
            src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi.sig
            src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe.sig
          retention-days: 1
          if-no-files-found: error

  deploy_binaries_and_updater_in_s3:
    needs: [build_app]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download All Artifacts
        uses: actions/download-artifact@v8

      - name: Install zip and jq
        run: sudo apt-get update && sudo apt-get install -y zip jq

      - name: Create directory for dist and dist-updater
        run: mkdir dist && mkdir dist-updater

      - name: Extract signatures and set environment variables
        shell: bash
        run: |
          set -euo pipefail

          {
            echo 'DARWIN_AARCH64_SIGNATURE<<EOF'
            cat "$(find macos -type f -name '*.app.tar.gz.sig' | head -n 1)"
            echo
            echo 'EOF'

            echo 'LINUX_X86_64_SIGNATURE<<EOF'
            cat "$(find linux-x86_64 -type f -name '*.AppImage.sig' | head -n 1)"
            echo
            echo 'EOF'

            echo 'LINUX_AARCH64_SIGNATURE<<EOF'
            cat "$(find linux-arm64 -type f -name '*.AppImage.sig' | head -n 1)"
            echo
            echo 'EOF'

            echo 'WINDOWS_X86_64_SIGNATURE<<EOF'
            cat "$(find windows-x86_64 -type f -name '*.msi.sig' | head -n 1)"
            echo
            echo 'EOF'

            echo 'WINDOWS_AARCH64_SIGNATURE<<EOF'
            cat "$(find windows-arm64 -type f -name '*.msi.sig' | head -n 1)"
            echo
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Modify the updater-manifest.json file for the signature
        run: |
          jq --arg sig "$DARWIN_AARCH64_SIGNATURE" '.platforms["darwin-aarch64"].signature = $sig' src-tauri/updater-manifest.json > src-tauri/updater-manifest.tmp.json
          mv src-tauri/updater-manifest.tmp.json src-tauri/updater-manifest.json

          jq --arg sig "$LINUX_X86_64_SIGNATURE" '.platforms["linux-x86_64"].signature = $sig' src-tauri/updater-manifest.json > src-tauri/updater-manifest.tmp.json
          mv src-tauri/updater-manifest.tmp.json src-tauri/updater-manifest.json

          jq --arg sig "$LINUX_AARCH64_SIGNATURE" '.platforms["linux-aarch64"].signature = $sig' src-tauri/updater-manifest.json > src-tauri/updater-manifest.tmp.json
          mv src-tauri/updater-manifest.tmp.json src-tauri/updater-manifest.json

          jq --arg sig "$WINDOWS_X86_64_SIGNATURE" '.platforms["windows-x86_64"].signature = $sig' src-tauri/updater-manifest.json > src-tauri/updater-manifest.tmp.json
          mv src-tauri/updater-manifest.tmp.json src-tauri/updater-manifest.json

          jq --arg sig "$WINDOWS_AARCH64_SIGNATURE" '.platforms["windows-aarch64"].signature = $sig' src-tauri/updater-manifest.json > src-tauri/updater-manifest.tmp.json
          mv src-tauri/updater-manifest.tmp.json src-tauri/updater-manifest.json

          # Modifier tout les occurence du domaine : "https://api.prospectresearch.alyvo.fr" en "https://staging.api.prospectresearch.alyvo.fr" dans le fichier updater-manifest.json
          sed -i 's/https:\/\/api.prospectresearch.alyvo.fr/https:\/\/staging.api.prospectresearch.alyvo.fr/g' src-tauri/updater-manifest.json

          # Display the updated updater-manifest.json file
          cat src-tauri/updater-manifest.json

      - name: Copy updater-manifest.json to dist-updater directory
        run: cp src-tauri/updater-manifest.json dist-updater/

      - name: Move and flatten Linux files to dist directory
        run: |
          find linux-x86_64 -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.AppImage.sig' \) -exec mv {} dist/ \;
          find linux-arm64 -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.AppImage.sig' \) -exec mv {} dist/ \;

      - name: Move and flatten macOS files to dist directory
        run: |
          find macos -type f \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \) -exec mv {} dist/ \;

      - name: Move macOS .app folders to dist directory
        # Bundle .app a revoir, puisque via le step S3 cela envoie pas le bundle actuellement
        run: |
          # Définir le chemin de base où se trouvent les dossiers .app
          base_path="macos/target"

          # Liste des architectures compilées
          architectures=("aarch64-apple-darwin")

          # Boucle sur chaque architecture pour déplacer les dossiers .app
          for arch in "${architectures[@]}"; do
            # Vérifier si le dossier .app existe avant de tenter de le déplacer
            app_path="${base_path}/${arch}/release/bundle/macos/*.app"
            if compgen -G "$app_path" > /dev/null; then
              echo "Moving .app for architecture $arch"
              mv $app_path dist/
            else
              echo "No .app found for architecture $arch"
            fi
          done

      - name: Move and flatten Windows files to dist directory
        run: |
          find windows-x86_64 -type f \( -name '*.msi' -o -name '*.exe' -o -name '*.msi.sig' -o -name '*.exe.sig' \) -exec mv {} dist/ \;
          find windows-arm64 -type f \( -name '*.msi' -o -name '*.exe' -o -name '*.msi.sig' -o -name '*.exe.sig' \) -exec mv {} dist/ \;

      - name: Install AWS CLI for deploy on OVH S3
        run: |
          python -m pip install --upgrade pip
          pip install awscli

      - name: Deploy binaries Launcher for all platforms to bucket S3 (OVH)
        run: |
          aws --endpoint-url "$OVH_S3_ENDPOINT" s3 sync \
            "dist/" "s3://$OVH_S3_BUCKET/prospectresearch/staging/software/download/" \
            --delete \
            --exclude "*" \
            --include "*.deb" \
            --include "*.rpm" \
            --include "*.AppImage" \
            --include "*.AppImage.sig" \
            --include "*.dmg" \
            --include "*.app.tar.gz" \
            --include "*.app.tar.gz.sig" \
            --include "*.msi" \
            --include "*.exe" \
            --include "*.msi.sig" \
            --include "*.exe.sig"

      - name: Deploy manifest 'updater-manifest.json' to bucket S3 (OVH)
        run: |
          aws --endpoint-url "$OVH_S3_ENDPOINT" s3 cp \
            "dist-updater/updater-manifest.json" \
            "s3://$OVH_S3_BUCKET/prospectresearch/staging/software/updater/updater-manifest.json"
